<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111; }
      .title { font-size: 22px; font-weight: 700; }
      .subtitle { font-size: 11px; }
      .zone-title { font-size: 16px; font-weight: 700; }
      .label { font-size: 12px; }
      .small { font-size: 10px; }
      .white { fill: #fff; }
      .outline { fill: none; stroke: #111; stroke-width: 2; }
      .dash { fill: none; stroke: #333; stroke-width: 2; stroke-dasharray: 8 8; }
      .preview { fill: none; stroke: #777; stroke-width: 2; stroke-dasharray: 4 6; }
      .arrow { fill: none; stroke: #222; stroke-width: 2; marker-end: url(#arrow); }
      .light-arrow { fill: none; stroke: #777; stroke-width: 1.5; marker-end: url(#arrow); }
      .flow { fill: none; stroke: #111; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#fff"/>
  <text x="640" y="38" text-anchor="middle" class="title">LIVING HUB TAVERN - SPATIAL BLOCKING V6 LANDSCAPE REVIEW</text>
  <text x="640" y="62" text-anchor="middle" class="subtitle">V6: adjacent camera anchors preview neighboring primary landmarks, Center remains dominant</text>

  <!-- Tavern footprint: one continuous horizontal building -->
  <rect x="80" y="115" width="1120" height="430" fill="#eeeeee" stroke="#111" stroke-width="3"/>
  <rect x="80" y="115" width="373" height="430" fill="#e6e6e6"/>
  <rect x="453" y="115" width="374" height="430" fill="#d8d8d8"/>
  <rect x="827" y="115" width="373" height="430" fill="#e6e6e6"/>
  <line x1="453" y1="115" x2="453" y2="545" stroke="#aaa" stroke-width="2"/>
  <line x1="827" y1="115" x2="827" y2="545" stroke="#aaa" stroke-width="2"/>
  <rect x="80" y="115" width="1120" height="430" class="outline"/>

  <!-- Camera anchors with stronger overlap previews -->
  <rect x="80" y="100" width="560" height="460" class="dash"/>
  <rect x="360" y="100" width="560" height="460" class="dash"/>
  <rect x="640" y="100" width="560" height="460" class="dash"/>
  <text x="210" y="575" text-anchor="middle" class="small">Left Anchor</text>
  <text x="640" y="575" text-anchor="middle" class="small">Center Anchor / Default</text>
  <text x="1070" y="575" text-anchor="middle" class="small">Right Anchor</text>

  <!-- Preview windows -->
  <rect x="555" y="205" width="85" height="190" class="preview"/>
  <text x="596" y="197" text-anchor="middle" class="small">Center landmark preview</text>
  <rect x="365" y="300" width="85" height="145" class="preview"/>
  <text x="408" y="292" text-anchor="middle" class="small">Left landmark preview</text>
  <rect x="827" y="238" width="90" height="118" class="preview"/>
  <text x="872" y="230" text-anchor="middle" class="small">Right landmark preview</text>

  <!-- Zone titles -->
  <text x="266" y="142" text-anchor="middle" class="zone-title">LEFT</text>
  <text x="266" y="162" text-anchor="middle" class="label">Social Heart / Arrival</text>
  <text x="640" y="142" text-anchor="middle" class="zone-title">CENTER</text>
  <text x="640" y="162" text-anchor="middle" class="label">The Guild</text>
  <text x="1014" y="142" text-anchor="middle" class="zone-title">RIGHT</text>
  <text x="1014" y="162" text-anchor="middle" class="label">Growth</text>

  <!-- Expanded negative walking area -->
  <rect x="155" y="392" width="970" height="118" fill="#fafafa" stroke="#888" stroke-width="1.5"/>
  <text x="640" y="444" text-anchor="middle" class="label">Expanded Main Walking Area / Intentional Negative Space</text>
  <text x="640" y="462" text-anchor="middle" class="small">Adjacent zones reveal landmarks at edge of neighboring camera anchor</text>

  <!-- Center landmarks only, still dominant -->
  <circle cx="640" cy="292" r="66" fill="#6f6f6f" stroke="#111" stroke-width="3"/>
  <text x="640" y="274" text-anchor="middle" class="zone-title white">1</text>
  <text x="640" y="295" text-anchor="middle" class="label white">Six-member</text>
  <text x="640" y="313" text-anchor="middle" class="label white">Round Table</text>
  <circle cx="640" cy="212" r="10" fill="#b3b3b3" stroke="#555"/>
  <circle cx="710" cy="252" r="10" fill="#b3b3b3" stroke="#555"/>
  <circle cx="710" cy="332" r="10" fill="#b3b3b3" stroke="#555"/>
  <circle cx="640" cy="372" r="10" fill="#b3b3b3" stroke="#555"/>
  <circle cx="570" cy="332" r="10" fill="#b3b3b3" stroke="#555"/>
  <circle cx="570" cy="252" r="10" fill="#b3b3b3" stroke="#555"/>

  <rect x="540" y="180" width="200" height="44" fill="#999" stroke="#111" stroke-width="2"/>
  <text x="640" y="198" text-anchor="middle" class="zone-title white">2</text>
  <text x="640" y="217" text-anchor="middle" class="label white">Inn</text>

  <rect x="588" y="235" width="104" height="34" fill="#bcbcbc" stroke="#333" stroke-width="2"/>
  <text x="640" y="257" text-anchor="middle" class="label">3 Fireplace</text>

  <!-- Left Zone: main landmarks shifted so Center anchor previews their edge -->
  <rect x="155" y="190" width="190" height="40" fill="#fff" stroke="#555" stroke-width="2"/>
  <text x="250" y="215" text-anchor="middle" class="label">Large Window</text>

  <rect x="108" y="235" width="312" height="44" fill="#999" stroke="#111" stroke-width="2"/>
  <text x="264" y="254" text-anchor="middle" class="label white">Tavern Bar against rear wall</text>
  <text x="264" y="271" text-anchor="middle" class="small white">Bartender permanently operates behind bar</text>
  <ellipse cx="264" cy="218" rx="52" ry="20" fill="#c9c9c9" stroke="#555" stroke-width="2"/>
  <text x="264" y="223" text-anchor="middle" class="small">Bartender</text>

  <rect x="92" y="470" width="112" height="56" fill="#d8d8d8" stroke="#111" stroke-width="2"/>
  <text x="148" y="493" text-anchor="middle" class="label">Main Entrance</text>
  <text x="148" y="511" text-anchor="middle" class="small">Traveller Arrival</text>
  <rect x="112" y="430" width="72" height="40" fill="#eeeeee" stroke="#555" stroke-width="2"/>
  <text x="148" y="454" text-anchor="middle" class="small">Vestibule</text>
  <line x1="148" y1="430" x2="220" y2="390" class="light-arrow"/>

  <rect x="215" y="315" width="150" height="50" fill="#b3b3b3" stroke="#111" stroke-width="2"/>
  <text x="290" y="336" text-anchor="middle" class="label">4 Traveller Table A</text>
  <rect x="338" y="378" width="150" height="50" fill="#a8a8a8" stroke="#111" stroke-width="2"/>
  <text x="413" y="399" text-anchor="middle" class="label">4 Traveller Table B</text>

  <circle cx="200" cy="306" r="10" fill="#777" stroke="#444"/>
  <circle cx="375" cy="306" r="10" fill="#777" stroke="#444"/>
  <circle cx="205" cy="380" r="10" fill="#777" stroke="#444"/>
  <circle cx="500" cy="392" r="10" fill="#777" stroke="#444"/>
  <circle cx="280" cy="430" r="10" fill="#777" stroke="#444"/>
  <text x="330" y="302" text-anchor="middle" class="small">Recruitable Travellers in foreground</text>

  <ellipse cx="270" cy="390" rx="44" ry="22" fill="#c9c9c9" stroke="#555" stroke-width="2"/>
  <text x="270" y="395" text-anchor="middle" class="label">Bard</text>
  <text x="260" y="468" text-anchor="middle" class="small">Bard near seating + main circulation path</text>

  <!-- Right Zone: blacksmith close enough for Center anchor preview -->
  <rect x="838" y="250" width="145" height="66" fill="#999" stroke="#111" stroke-width="2"/>
  <text x="910" y="274" text-anchor="middle" class="zone-title white">5</text>
  <text x="910" y="297" text-anchor="middle" class="label white">Blacksmith</text>

  <circle cx="1022" cy="283" r="38" fill="#9f9f9f" stroke="#111" stroke-width="2"/>
  <text x="1022" y="279" text-anchor="middle" class="label white">Furnace</text>
  <text x="1022" y="296" text-anchor="middle" class="small white">adjacent</text>

  <rect x="895" y="338" width="205" height="54" fill="#b3b3b3" stroke="#555" stroke-width="2"/>
  <text x="997" y="361" text-anchor="middle" class="label">6 Workshop</text>
  <text x="997" y="379" text-anchor="middle" class="small">production area below / behind smith</text>

  <rect x="1050" y="128" width="132" height="54" fill="#d8d8d8" stroke="#111" stroke-width="2"/>
  <text x="1116" y="150" text-anchor="middle" class="label">Market Entrance</text>
  <text x="1116" y="168" text-anchor="middle" class="small">outdoor transition</text>

  <rect x="1030" y="492" width="150" height="32" fill="#d8d8d8" stroke="#555" stroke-width="2"/>
  <text x="1105" y="512" text-anchor="middle" class="small">Basement Warehouse</text>

  <!-- Right zone progression flow -->
  <line x1="910" y1="318" x2="958" y2="338" class="flow"/>
  <line x1="1042" y1="338" x2="1098" y2="183" class="flow"/>
  <text x="1035" y="232" text-anchor="middle" class="small">Right Zone flow:</text>
  <text x="1035" y="247" text-anchor="middle" class="small">Blacksmith -&gt; Workshop -&gt; Market</text>

  <!-- Preview callouts -->
  <line x1="595" y1="395" x2="488" y2="402" class="light-arrow"/>
  <text x="560" y="410" text-anchor="middle" class="small">Center anchor sees edge of Left social landmark</text>
  <line x1="810" y1="300" x2="838" y2="285" class="light-arrow"/>
  <text x="785" y="286" text-anchor="middle" class="small">Center anchor previews Right landmark</text>
  <line x1="530" y1="250" x2="574" y2="292" class="light-arrow"/>
  <text x="508" y="237" text-anchor="middle" class="small">Left anchor previews Center</text>

  <!-- Focus and flow -->
  <line x1="640" y1="680" x2="640" y2="365" class="arrow"/>
  <text x="640" y="702" text-anchor="middle" class="zone-title">Primary Focus</text>

  <line x1="520" y1="650" x2="600" y2="230" class="light-arrow"/>
  <text x="520" y="672" text-anchor="middle" class="small">Secondary Focus: Inn + Fireplace</text>

  <line x1="760" y1="650" x2="290" y2="365" class="light-arrow"/>
  <line x1="760" y1="650" x2="910" y2="318" class="light-arrow"/>
  <text x="870" y="672" text-anchor="middle" class="small">Peripheral Visibility: adjacent landmarks subtly previewed</text>

  <line x1="420" y1="603" x2="560" y2="603" class="arrow"/>
  <line x1="720" y1="603" x2="860" y2="603" class="arrow"/>
  <text x="640" y="628" text-anchor="middle" class="small">Visual flow: previews encourage exploration while Center remains dominant</text>

  <rect x="70" y="610" width="250" height="64" fill="#fff" stroke="#999" stroke-width="1.5"/>
  <text x="195" y="630" text-anchor="middle" class="small">Legend</text>
  <text x="195" y="648" text-anchor="middle" class="small">Dashed boxes = camera anchors</text>
  <text x="195" y="666" text-anchor="middle" class="small">Small dashed boxes = adjacent landmark preview</text>
</svg>
