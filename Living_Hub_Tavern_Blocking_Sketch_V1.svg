  <line x1="220" y1="360" x2="1060" y2="360" stroke="#111" stroke-width="3"/>
  <rect x="220" y="300" width="220" height="120" fill="#e6e6e6" stroke="#111" stroke-width="2"/>
  <rect x="530" y="270" width="220" height="180" fill="#d8d8d8" stroke="#111" stroke-width="2"/>
  <rect x="840" y="300" width="220" height="120" fill="#e6e6e6" stroke="#111" stroke-width="2"/>
  <text x="330" y="368" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">LEFT</text>
  <text x="640" y="368" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">CENTER</text>
  <text x="950" y="368" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">RIGHT</text>
  <text x="640" y="510" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14">
